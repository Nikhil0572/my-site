<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SS ENTERPRISES</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS RESET & VARIABLES FOR EXACT IMAGE MATCH */
        :root {
            --bg-color: #13131a;
            --sidebar-bg: #191922;
            --card-bg: #191922;
            --text-main: #ffffff;
            --text-muted: #787885;
            --accent-orange: #ff9f1c;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg-color: #f4f6f9;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1a1f36;
            --text-muted: #697386;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* MAIN CONTAINER (SIDEBAR + CONTENT) */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR STYLING */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            margin-bottom: 35px;
        }

        .branding-logo {
            background: #ff9800; 
            color: #000; 
            font-weight: bold; 
            width: 42px; 
            height: 42px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 8px; 
            font-size: 18px;
        }

        .brand-name {
            font-weight: 700; 
            margin-left: 12px; 
            font-size: 18px; 
            letter-spacing: 0.5px;
        }

        .menu-category {
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin: 20px 0 10px 5px;
            font-weight: 700;
        }

        .nav-menu {
            list-style: none;
            margin-bottom: 15px;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s;
        }

        .nav-link.active {
            background-color: #ff9800;
            color: #000000 !important;
            font-weight: 600;
        }

        .nav-icon {
            margin-right: 12px;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        /* RIGHT SIDE CONTENT AREA */
        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        /* TOP NAVBAR (SEARCH + PROFILE) */
        .top-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .search-container {
            position: relative;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            padding: 12px 15px 12px 40px;
            border-radius: 10px;
            color: var(--text-main);
            width: 280px;
            font-size: 14px;
            outline: none;
        }

        .search-container::before {
            content: '🔍';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }

        .notification-bell {
            position: relative;
            cursor: pointer;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.04);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bell-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff9800;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .avatar {
            width: 38px;
            height: 38px;
            background: #ff9800;
            color: #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        /* GRID SYSTEM MATCHING IMAGE */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .dashboard-card {
            background-color: var(--card-bg);
            border-radius: 14px;
            padding: 25px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
        }

        /* PILL FILTERS (1D, 1W, Week, Month) */
        .pill-filters {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.15);
            padding: 4px;
            border-radius: 8px;
        }

        .pill-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .pill-btn.active {
            background-color: #ff9800;
            color: #000 !important;
        }

        /* DUMMY CHART GRAPHICS FOR VISUAL LOOK */
        .chart-placeholder-line {
            height: 160px;
            width: 100%;
            background: linear-gradient(transparent 80%, rgba(255, 152, 0, 0.05)), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 30" preserveAspectRatio="none"><path d="M0,25 Q15,18 30,20 T60,12 T90,5 T100,2" fill="none" stroke="%23ff9800" stroke-width="1.5"/></svg>');
            background-size: 100% 100%;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 12px;
            padding-top: 20px;
        }

        .chart-placeholder-bar {
            height: 160px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            font-size: 11px;
            color: var(--text-muted);
        }

        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .bar {
            width: 16px;
            border-radius: 4px 4px 0 0;
            position: relative;
        }

        .bar::before {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: bold;
        }

        /* LOWER ROW CARDS */
        .metric-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge-positive {
            background: rgba(46, 204, 113, 0.15);
            color: #2ece71;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        /* THEME TOGGLE SWITCH */
        .theme-switch {
            cursor: pointer;
            width: 44px;
            height: 22px;
            background: #444450;
            border-radius: 20px;
            position: relative;
            transition: background 0.3s;
        }
        
        .theme-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            top: 3px;
            left: 3px;
            transition: 0.3s;
        }

        .theme-switch.active {
