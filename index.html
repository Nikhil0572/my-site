<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SS ENTERPRISES</title>
        <script>
        // Page load hote hi turant dark/light theme apply karne ke liye
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="templatemo-crypto-style.css">
    <link rel="stylesheet" href="templatemo-crypto-dashboard.css">
    <style>
        /* Light mode active hone par screen ke saare colors badalne ke liye */
        [data-theme="light"] {
            background-color: #f4f6f9 !important;
            color: #1a1f36 !important;
        }
        [data-theme="light"] .sidebar, [data-theme="light"] aside {
            background-color: #ffffff !important;
            border-right: 1px solid #e2e8f0 !important;
        }
        [data-theme="light"] .dashboard-card, [data-theme="light"] .card, [data-theme="light"] main, [data-theme="light"] .main-content {
            background-color: #ffffff !important;
            color: #1a1f36 !important;
        }
        [data-theme="light"] h1, [data-theme="light"] h2, [data-theme="light"] h3, [data-theme="light"] p, [data-theme="light"] span, [data-theme="light"] .nav-text {
            color: #1a1f36 !important;
        }
        .theme-switch.active {
            background-color: #ff9800 !important;
        }
    </style>>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="branding-logo" style="background: #ff9800; color: #000; font-weight: bold; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 18px;">SS</div>
                <span class="brand-name" style="font-weight: 700; margin-left: 10px; font-size: 18px; color: var(--text-color);">ENTERPRISES</span>
            </div>
            <p class="menu-category">MAIN MENU</p>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link active">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">Inventory</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <span class="nav-icon">💳</span>
                        <span class="nav-text">Wallet</span>
                    </a>
                </li>
            </ul>
            <p class="menu-category">ACCOUNT</p>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <span class="nav-icon">🔧</span>
                        <span class="nav-text">Settings</span>
                    </a>
                </li>
               <li class="nav-item text-center" style="margin-top: 20px; padding: 0 15px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
                        <span style="font-size: 14px; color: #ccc;">Light Mode</span>
                        <div class="theme-switch" id="themeSwitch" style="cursor: pointer; width: 40px; height: 20px; background: #555; border-radius: 10px; position: relative;" onclick="
                            this.classList.toggle('active');
                            const htmlTag = document.documentElement;
                            const currentTheme = htmlTag.getAttribute('data-theme') || 'dark';
                            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                            htmlTag.setAttribute('data-theme', newTheme);
                            localStorage.setItem('theme', newTheme);
                        "></div>
                    </div>
                </li>
                <li class="nav-item" style="margin-top: 10px;">
                    <button class="logout-btn" style="width: 100%; background: #ff9800; color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer;" onclick="
                        if(confirm('Kya aap sach me Logout karna chahte hain?')) {
                            window.location.href = 'login.html';
                        }
                    ">Logout</button>
                </li>
                </li>
            </ul>
        </aside>
