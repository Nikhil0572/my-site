<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Cute Ghost Theme</title>
    <!-- Tailwind CSS for beautiful styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f3f4f6;
        }
        .heading-font {
            font-family: 'Fredoka', sans-serif;
        }
        
        /* Floating animation ghosts ke liye */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes float-delayed {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .ghost-float-1 {
            animation: float 4s ease-in-out infinite;
        }

        .ghost-float-2 {
            animation: float-delayed 3.5s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        /* Speech bubble arrow styling */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #ffffff transparent;
            display: block;
            width: 0;
        }
        .speech-bubble-border::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 11px 11px 0;
            border-style: solid;
            border-color: #000000 transparent;
            display: block;
            width: 0;
            z-index: -1;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Main Card Container -->
    <div class="bg-white rounded-[2rem] shadow-2xl flex flex-col md:flex-row overflow-hidden max-w-4xl w-full border-4 border-gray-100 min-h-[500px]">
        
        <!-- LEFT PANEL: Animated Cute Ghosts & Speech Bubble -->
        <div class="w-full md:w-1/2 p-8 flex flex-col items-center justify-center relative bg-white select-none">
            
            <!-- Speech Bubble (Dynamic Text) -->
            <div class="relative mb-6 z-10 transition-all duration-300 transform" id="bubbleContainer">
                <div class="speech-bubble-border"></div>
                <div class="speech-bubble bg-white border-[3px] border-black text-black px-6 py-2.5 rounded-full font-extrabold text-lg tracking-wide shadow-md text-center min-w-[160px]">
                    <span id="speechText">Sign In please!</span>
                </div>
            </div>

            <!-- Ghosts Illustration Container -->
            <div class="flex items-end justify-center space-x-4 h-56 w-full relative">
                
                <!-- Ghost 1: Small cute ghost on left -->
                <div class="ghost-float-1 w-28 h-28 relative">
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <!-- Shadow -->
                        <ellipse cx="50" cy="95" rx="25" ry="5" fill="#e5e7eb" />
                        <!-- Ghost Body -->
                        <path d="M20,60 C20,30 80,30 80,60 L80,85 C80,85 72,80 65,85 C58,90 50,80 42,85 C34,90 28,80 20,85 Z" fill="#ffffff" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
                        <!-- Hands -->
                        <path d="M15,62 C10,64 8,68 12,70" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
                        <path d="M85,62 C90,64 92,68 88,70" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
                        <!-- Face (Dynamic Eyes) -->
                        <g id="ghost1Face">
                            <!-- Happy Eyes -->
                            <path d="M38,50 C38,46 44,46 44,50" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                            <path d="M56,50 C56,46 62,46 62,50" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                            <!-- Blushing cheeks -->
                            <ellipse cx="34" cy="56" rx="4" ry="2" fill="#ffb6c1" />
                            <ellipse cx="66" cy="56" rx="4" ry="2" fill="#ffb6c1" />
                            <!-- Smile -->
                            <path d="M47,58 Q50,62 53,58" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
                        </g>
                    </svg>
                </div>

                <!-- Ghost 2: Taller happy ghost waving on right -->
                <div class="ghost-float-2 w-36 h-36 relative">
                    <!-- Sparkles/Magic dots -->
                    <div class="absolute -top-2 -right-1 text-yellow-400 text-xl font-bold animate-pulse">✦</div>
                    <div class="absolute top-6 -left-2 text-yellow-400 text-xs font-bold animate-ping">✦</div>
                    
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <!-- Shadow -->
                        <ellipse cx="50" cy="95" rx="30" ry="5" fill="#e5e7eb" />
                        <!-- Ghost Body -->
                        <path d="M15,50 C15,20 85,20 85,50 L85,85 C85,85 75,78 68,85 C61,92 52,80 44,85 C36,90 28,80 15,85 Z" fill="#ffffff" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
                        <!-- Left Hand Waving up -->
                        <path d="M12,50 C5,44 5,35 11,38" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
                        <!-- Right Hand Waving up -->
                        <path d="M88,50 C95,44 95,35 89,38" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
                        <!-- Face -->
                        <g id="ghost2Face">
                            <!-- Happy Curved Eyes -->
                            <path d="M34,44 C34,39 42,39 42,44" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                            <path d="M58,44 C58,39 66,39 66,44" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                            <!-- Cheeks -->
                            <ellipse cx="30" cy="51" rx="5" ry="2.5" fill="#ff7c7c" />
                            <ellipse cx="70" cy="51" rx="5" ry="2.5" fill="#ff7c7c" />
                            <!-- Big Laughing Mouth -->
                            <path d="M44,52 C44,60 56,60 56,52 Z" fill="#ff7c7c" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
                        </g>
                    </svg>
                </div>

            </div>
        </div>

        <!-- RIGHT PANEL: Sign In Form with exact interactive features -->
        <div class="w-full md:w-1/2 p-8 md:p-12 bg-[#fafafa] flex flex-col justify-center border-t md:border-t-0 md:border-l border-gray-100">
            
            <h2 class="text-3xl font-extrabold text-gray-800 mb-8 text-left heading-font tracking-wide">Sign In</h2>
            
            <form id="loginForm" onsubmit="handleFormSubmit(event)" class="space-y-5">
                <!-- Email Input Field -->
                <div class="flex flex-col text-left">
                    <label class="text-gray-500 font-semibold text-sm mb-2" for="emailInput">Email Address</label>
                    <input 
                        type="text" 
                        id="emailInput" 
                        placeholder="user1" 
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent bg-white text-gray-800 font-medium transition duration-200"
                    >
                </div>

                <!-- Password Input Field -->
                <div class="flex flex-col text-left">
                    <label class="text-gray-500 font-semibold text-sm mb-2" for="passwordInput">Password</label>
                    <input 
                        type="password" 
                        id="passwordInput" 
                        placeholder="••••" 
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent bg-white text-gray-800 font-medium transition duration-200"
                    >
                </div>

                <!-- Sign In Button (Purple Gradient) -->
                <button 
                    type="submit" 
                    id="signInBtn"
                    class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-extrabold py-3.5 px-6 rounded-xl transition duration-200 transform active:scale-[0.98] shadow-lg shadow-purple-100 text-base tracking-wide"
                >
                    Sign In
                </button>
            </form>

            <!-- Status Alerts Area (Initially hidden/Interactive) -->
            <div class="mt-4 space-y-3">
                <!-- 1. Success Banner (Greenish Style exactly like image) -->
                <div 
                    id="successBanner" 
                    class="hidden items-center justify-center bg-[#e8f5e9] border-l-4 border-[#2ece71] text-gray-800 font-bold py-3.5 px-4 rounded-xl shadow-sm animate-bounce"
                >
                    <span class="text-[#2ece71] mr-2">✔</span> Login Successful!
                </div>

                <!-- 2. Try Again Button (Gray style exactly like image) -->
                <button 
                    id="tryAgainBtn"
                    onclick="resetForm()"
                    class="hidden w-full bg-[#6b7280] hover:bg-[#4b5563] text-white font-bold py-3.5 px-6 rounded-xl transition duration-200 transform active:scale-[0.98] shadow-md text-center"
                >
                    Try Again
                </button>
            </div>

        </div>

    </div>

    <!-- JavaScript to handle interactive state changes -->
    <script>
        // Form states aur validations handle karne ka funtion
        function handleFormSubmit(event) {
            event.preventDefault();

            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            const speechText = document.getElementById('speechText');
            const successBanner = document.getElementById('successBanner');
            const tryAgainBtn = document.getElementById('tryAgainBtn');
            const signInBtn = document.getElementById('signInBtn');

            // Image ke according dynamic behavior check karein
            if (email === "user1" && password === "1234") {
                // Sahi password input karne par
                speechText.innerText = "Correct Password!";
                speechText.parentElement.classList.remove('border-black');
                speechText.parentElement.classList.add('border-green-500', 'text-green-600');
                
                // Success Green Notification Bar show karein
                successBanner.classList.remove('hidden');
                successBanner.classList.add('flex');

                // Try Again button dikhayein
                tryAgainBtn.classList.remove('hidden');

                // Disable submit button
                signInBtn.disabled = true;
                signInBtn.classList.add('opacity-50', 'cursor-not-allowed');

                // Cute Ghost faces change to extra happy (SVG Face alteration)
                setGhostFace('happy');

                // Successful redirect to dashboard after a delay (optional but professional)
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                // Galat password input karne par
                speechText.innerText = "Wrong Password! ☹";
                speechText.parentElement.classList.add('border-red-500', 'text-red-500');

                // Try Again button active karein bina success banner ke
                tryAgainBtn.classList.remove('hidden');
                
                setGhostFace('sad');
            }
        }

        // SVG faces badalne ke liye switch function
        function setGhostFace(status) {
            const face1 = document.getElementById('ghost1Face');
            const face2 = document.getElementById('ghost2Face');

            if (status === 'happy') {
                // Ghost 1 Happy Face
                face1.innerHTML = `
                    <path d="M38,48 C38,44 44,44 44,48" fill="none" stroke="#2ece71" stroke-width="5" stroke-linecap="round"/>
                    <path d="M56,48 C56,44 62,44 62,48" fill="none" stroke="#2ece71" stroke-width="5" stroke-linecap="round"/>
                    <ellipse cx="34" cy="56" rx="4" ry="2" fill="#ffb6c1" />
                    <ellipse cx="66" cy="56" rx="4" ry="2" fill="#ffb6c1" />
                    <path d="M45,56 Q50,62 55,56" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                `;
                // Ghost 2 Ultra Happy Face
                face2.innerHTML = `
                    <path d="M34,44 C34,39 42,39 42,44" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                    <path d="M58,44 C58,39 66,39 66,44" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                    <ellipse cx="30" cy="51" rx="5" ry="2.5" fill="#ff7c7c" />
                    <ellipse cx="70" cy="51" rx="5" ry="2.5" fill="#ff7c7c" />
                    <path d="M42,50 Q50,62 58,50 Z" fill="#ff7c7c" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
                `;
            } else if (status === 'sad') {
                // Ghost 1 Sad Face
                face1.innerHTML = `
                    <ellipse cx="38" cy="48" rx="3.5" ry="5" fill="#000000" />
                    <ellipse cx="62" cy="48" rx="3.5" ry="5" fill="#000000" />
                    <path d="M46,60 Q50,54 54,60" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
                `;
                // Ghost 2 Sad/Worried Face
                face2.innerHTML = `
                    <path d="M32,40 Q38,44 40,42" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
                    <path d="M68,40 Q62,44 60,42" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
                    <ellipse cx="36" cy="48" rx="4" ry="4" fill="#000000" />
                    <ellipse cx="64" cy="48" rx="4" ry="4" fill="#000000" />
                    <path d="M45,58 Q50,52 55,58" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
                `;
            }
        }

        // Form ko pehle jaisa (Reset) karne ka function
        function resetForm() {
            document.getElementById('loginForm').reset();
            
            const speechText = document.getElementById('speechText');
            const successBanner = document.getElementById('successBanner');
            const tryAgainBtn = document.getElementById('tryAgainBtn');
            const signInBtn = document.getElementById('signInBtn');

            // Reset Speech bubble
            speechText.innerText = "Sign In please!";
            speechText.parentElement.className = "speech-bubble bg-white border-[3px] border-black text-black px-6 py-2.5 rounded-full font-extrabold text-lg tracking-wide shadow-md text-center min-w-[160px]";

            // Hide Alerts
            successBanner.classList.add('hidden');
            successBanner.classList.remove('flex');
            tryAgainBtn.classList.add('hidden');

            // Enable Sign In Button
            signInBtn.disabled = false;
            signInBtn.classList.remove('opacity-50', 'cursor-not-allowed');

            // Reset Ghost Faces to default
            document.getElementById('ghost1Face').innerHTML = `
                <path d="M38,50 C38,46 44,46 44,50" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                <path d="M56,50 C56,46 62,46 62,50" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                <ellipse cx="34" cy="56" rx="4" ry="2" fill="#ffb6c1" />
                <ellipse cx="66" cy="56" rx="4" ry="2" fill="#ffb6c1" />
                <path d="M47,58 Q50,62 53,58" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round"/>
            `;
            document.getElementById('ghost2Face').innerHTML = `
                <path d="M34,44 C34,39 42,39 42,44" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                <path d="M58,44 C58,39 66,39 66,44" fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round"/>
                <ellipse cx="30" cy="51" rx="5" ry="2.5" fill="#ff7c7c" />
                <ellipse cx="70" cy="51" rx="5" ry="2.5" fill="#ff7c7c" />
                <path d="M44,52 C44,60 56,60 56,52 Z" fill="#ff7c7c" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
            `;
        }
    </script>
</body>
</html>
