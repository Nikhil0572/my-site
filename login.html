<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - SS ENTERPRISES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            background-color: #131419;
            padding: 40px;
            border-radius: 14px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .logo-box {
            background: #ff9800;
            color: #000;
            font-weight: bold;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 20px;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            margin-left: 12px;
            letter-spacing: 0.5px;
        }

        .form-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ff9800;
            font-weight: 600;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #717579;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #ff9800;
        }

        .auth-btn {
            width: 100%;
            background: #ff9800;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.2s;
        }

        .auth-btn:hover {
            background: #e68a00;
        }

        .switch-mode-text {
            margin-top: 20px;
            font-size: 14px;
            color: #717579;
        }

        .switch-link {
            color: #ff9800;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 500;
        }

        .msg {
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
        .error-msg { color: #e74c3c; }
        .success-msg { color: #2ece71; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">
            <div class="logo-box">SS</div>
            <span class="brand-title">ENTERPRISES</span>
        </div>

        <div id="loginSection">
            <div class="form-title">Log In</div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Gmail / Username</label>
                    <input type="text" id="loginUser" placeholder="name@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="auth-btn">Log In</button>
            </form>
            <div class="switch-mode-text">
                Naya account banana hai? <span class="switch-link" onclick="toggleForm('signup')">Sign Up karein</span>
            </div>
        </div>

        <div id="signupSection" style="display: none;">
            <div class="form-title">Create Account (Sign Up)</div>
            <form onsubmit="handleSignUp(event)">
                <div class="form-group">
                    <label>Gmail ID</label>
                    <input type="email" id="signupEmail" placeholder="example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Naya Password</label>
                    <input type="password" id="signupPass" placeholder="Choose a strong password" required>
                </div>
                <button type="submit" class="auth-btn">Sign Up / Register</button>
            </form>
            <div class="switch-mode-text">
                Pehle se account hai? <span class="switch-link" onclick="toggleForm('login')">Login karein</span>
            </div>
        </div>

        <div id="errorBox" class="msg error-msg"></div>
        <div id="successBox" class="msg success-msg"></div>
    </div>

    <script>
        // Form switch karne ke liye (Login <-> Sign Up)
        function toggleForm(mode) {
            const loginSec = document.getElementById('loginSection');
            const signupSec = document.getElementById('signupSection');
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            if(mode === 'signup') {
                loginSec.style.display = 'none';
                signupSec.style.display = 'block';
            } else {
                loginSec.style.display = 'block';
                signupSec.style.display = 'none';
            }
        }

        // SIGN UP FUNCTION (Data save karne ke liye)
        function handleSignUp(event) {
            event.preventDefault();
            const email = document.getElementById('signupEmail').value.trim().toLowerCase();
            const pass = document.getElementById('signupPass').value.trim();
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            errorBox.style.display = 'none';

            // Check ki ye email pehle se register toh nahi hai
            if(localStorage.getItem(email)) {
                errorBox.innerText = "Yeh Gmail ID pehle se registered hai!";
                errorBox.style.display = 'block';
                return;
            }

            // LocalStorage mein email aur password save kar rahe hain
            localStorage.setItem(email, pass);
            
            successBox.innerText = "Account kamyabi se ban gaya! Ab Login karein.";
            successBox.style.display = 'block';
            
            // 1.5 second baad wapas login form par bhej dega
            setTimeout(() => {
                toggleForm('login');
                document.getElementById('loginUser').value = email;
            }, 1500);
        }

        // LOGIN FUNCTION (Data verify karne ke liye)
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('loginUser').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value.trim();
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            // LocalStorage se password fetch karna
            const savedPassword = localStorage.getItem(user);

            if(savedPassword && savedPassword === pass) {
                successBox.innerText = "Login Successful! Redirecting...";
                successBox.style.display = 'block';
                // Dashboard screen par bhej dega
                setTimeout(() => {
                    window.location.replace('index.html');
                }, 1000);
            } else {
                errorBox.innerText = "Galat Gmail ID ya Password!";
                errorBox.style.display = 'block';
            }
        }
    </script>

</body>
</html>
