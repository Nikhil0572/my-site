<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SS ENTERPRISES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: #131419;
            padding: 40px;
            border-radius: 14px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .logo-box {
            background: #ff9800;
            color: #000;
            font-weight: bold;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 20px;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            margin-left: 12px;
            letter-spacing: 0.5px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #717579;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #ff9800;
        }

        .login-btn {
            width: 100%;
            background: #ff9800;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #e68a00;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <div class="logo-box">SS</div>
            <span class="brand-title">ENTERPRISES</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username / Email</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="button" class="login-btn" onclick="checkCredentials()">Log In</button>
            <div id="error" class="error-msg">Galat Username ya Password!</div>
        </form>
    </div>

    <script>
        function checkCredentials() {
            const uName = document.getElementById('username').value.trim();
            const pWord = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error');

            // Dono fields check karne ke liye ki khali toh nahi hain
            if (uName === "" || pWord === "") {
                alert("Kripya Username aur Password dono bharein!");
                return;
            }

            // ID aur Password ki jaanch
            if (uName === 'admin' && pWord === '12345') {
                errorDiv.style.display = 'none';
                // Direct redirect to index.html dashboard
                window.location.replace('index.html');
            } else {
                errorDiv.style.display = 'block';
            }
        }
    </script>

</body>
</html>
